        // ==========================================
        // 3. UTILITIES & SERVICES
        // ==========================================
        const Utils = {
            formatCurrency: (amount) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(amount),
            formatDate: (dateStr) => {
                if (!dateStr) return "";
                const [y, m, d] = dateStr.split('-').map(Number);
                const thaiYear = y + 543;
                const dateObj = new Date(y, m - 1, d);
                return isNaN(dateObj.getTime()) ? "" : `${dateObj.getDate()} ${dateObj.toLocaleDateString('th-TH', { month: 'short' })} ${thaiYear}`;
            },
            formatMonthYearTH: (isoMonthStr) => {
                if (!isoMonthStr) return "ทั้งหมด";
                const [year, month] = isoMonthStr.split('-').map(Number);
                const thaiYear = year + 543;
                const date = new Date(year, month - 1, 1);
                return `${date.toLocaleDateString('th-TH', { month: 'long' })} ${thaiYear}`;
            },
            getTodayDateString: () => new Date().toISOString().split('T')[0],
            getPrevMonthStr: (currentMonthStr) => {
                const [year, month] = currentMonthStr.split('-').map(Number);
                const date = new Date(year, month - 2, 1);
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                return `${y}-${m}`;
            }
        };

        // Initialize Supabase
        const supabase = supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_KEY);

        const ApiService = {
            notifyTelegram: async (message) => {
                if (!APP_CONFIG.TELEGRAM_TOKEN || !APP_CONFIG.TELEGRAM_CHAT_ID) return;
                try {
                    await fetch(`https://api.telegram.org/bot${APP_CONFIG.TELEGRAM_TOKEN}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: APP_CONFIG.TELEGRAM_CHAT_ID, text: message, parse_mode: 'HTML' })
                    });
                } catch (e) { console.error("Telegram Error:", e); }
            },
            fetchCategories: async (user) => {
                const { data, error } = await supabase.from('categories').select('*').eq('user_id', user.id);
                if (error) return DEFAULT_CATEGORIES;
                const customCats = data.map(c => ({ id: c.id.toString(), name: c.name, color: c.color, isCustom: true }));
                return [...DEFAULT_CATEGORIES, ...customCats];
            },
            addCategory: async (user, name, color) => {
                const { data, error } = await supabase.from('categories').insert([{ user_id: user.id, name, color }]).select();
                if (error) throw error; return data[0];
            },
            deleteCategory: async (id) => {
                const { error } = await supabase.from('categories').delete().eq('id', id);
                if (error) throw error;
            },
            fetchTotalBalance: async (user, targetUserId = null) => {
                let query = supabase.from('transactions').select('amount, type');
                if (user.role !== 'admin') query = query.eq('user_id', user.id);
                else if (targetUserId) query = query.eq('user_id', targetUserId);
                
                const { data, error } = await query;
                if (error) return { totalBalance: 0 };
                const income = data.filter(t => t.type === 'income').reduce((a, c) => a + c.amount, 0);
                const expense = data.filter(t => t.type === 'expense').reduce((a, c) => a + c.amount, 0);
                return { totalBalance: income - expense };
            },
            fetchStats: async (user, targetUserId = null) => {
                const date = new Date(); date.setDate(date.getDate() - 30);
                let query = supabase.from('transactions').select('*').gte('date', date.toISOString().split('T')[0]);
                if (user.role !== 'admin') query = query.eq('user_id', user.id);
                else if (targetUserId) query = query.eq('user_id', targetUserId);
                const { data, error } = await query;
                return error ? [] : data;
            },
            fetchMonthlySummary: async (user, currentMonthStr, targetUserId = null) => {
                const prevMonthStr = Utils.getPrevMonthStr(currentMonthStr);
                const currStart = `${currentMonthStr}-01`;
                const currEnd = new Date(new Date(currStart).getFullYear(), new Date(currStart).getMonth() + 1, 0).toISOString().split('T')[0];
                const prevStart = `${prevMonthStr}-01`;
                const prevEnd = new Date(new Date(prevStart).getFullYear(), new Date(prevStart).getMonth() + 1, 0).toISOString().split('T')[0];

                let query = supabase.from('transactions').select('amount, type, date').gte('date', prevStart).lte('date', currEnd);
                if (user.role !== 'admin') query = query.eq('user_id', user.id);
                else if (targetUserId) query = query.eq('user_id', targetUserId);
                
                const { data, error } = await query;
                if (error) return { curr: { inc: 0, exp: 0 }, prev: { inc: 0, exp: 0 } };

                const summary = { curr: { inc: 0, exp: 0 }, prev: { inc: 0, exp: 0 } };
                data.forEach(t => {
                    const target = (t.date >= currStart && t.date <= currEnd) ? summary.curr : (t.date >= prevStart && t.date <= prevEnd ? summary.prev : null);
                    if(target) t.type === 'income' ? target.inc += t.amount : target.exp += t.amount;
                });
                return summary;
            },
            fetchPaginated: async (user, page, monthFilter, pageSize = 15, targetUserId = null, searchTerm = '') => {
                const from = (page - 1) * pageSize;
                const to = from + pageSize - 1;
                let query = supabase.from('transactions').select('*', { count: 'exact' });

                if (user.role !== 'admin') query = query.eq('user_id', user.id);
                else if (targetUserId) query = query.eq('user_id', targetUserId);

                if (monthFilter) {
                    const [year, month] = monthFilter.split('-');
                    const startDate = `${year}-${month}-01`;
                    const endDate = new Date(year, month, 0).toISOString().split('T')[0]; 
                    query = query.gte('date', startDate).lte('date', endDate);
                }
                if (searchTerm) query = query.or(`description.ilike.%${searchTerm}%,amount.eq.${isNaN(searchTerm) ? -1 : searchTerm}`);

                const { data, count, error } = await query.order('date', { ascending: false }).order('created_at', { ascending: false }).range(from, to);
                if (error) throw error;
                return { data: data.map(item => ({
                    id: item.id, userId: item.user_id, description: item.description, amount: item.amount,
                    type: item.type, category: item.category, date: item.date, paymentMethod: item.payment_method,
                    imageUrl: item.image_url, timestamp: item.created_at
                })), count };
            },
            uploadSlip: async (file) => {
                try {
                    const compressed = await imageCompression(file, { maxSizeMB: 0.3, maxWidthOrHeight: 1920, useWebWorker: true });
                    const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                    const { error } = await supabase.storage.from('slips').upload(fileName, compressed);
                    if (error) throw error;
                    const { data } = supabase.storage.from('slips').getPublicUrl(fileName);
                    return data.publicUrl;
                } catch (e) { throw new Error("อัปโหลดไม่สำเร็จ: " + e.message); }
            },
            fetchForExport: async (user, monthFilter, targetUserId = null) => {
                let query = supabase.from('transactions').select('*');
                if (user.role !== 'admin') query = query.eq('user_id', user.id);
                else if (targetUserId) query = query.eq('user_id', targetUserId);

                if (monthFilter) {
                    const [year, month] = monthFilter.split('-');
                    const startDate = `${year}-${month}-01`;
                    const endDate = new Date(year, month, 0).toISOString().split('T')[0]; 
                    query = query.gte('date', startDate).lte('date', endDate);
                }
                const { data, error } = await query.order('date', { ascending: true });
                if (error) throw error; return data;
            },
            // CRUD
            add: async (tx, user, catName) => {
                const { error } = await supabase.from('transactions').insert([{
                    user_id: tx.userId, description: tx.description, amount: parseFloat(tx.amount),
                    type: tx.type, category: tx.category, date: tx.date, payment_method: tx.paymentMethod, image_url: tx.imageUrl
                }]);
                if (error) throw error;
                ApiService.notifyTelegram(`📢 <b>บันทึกรายการใหม่</b>\n----------------\n📝 รายการ: ${tx.description}\n💰 จำนวน: ${Utils.formatCurrency(parseFloat(tx.amount))}\n📂 หมวดหมู่: ${catName}\n👤 โดย: ${user.name}\n📅 วันที่: ${Utils.formatDate(tx.date)}${tx.imageUrl ? '\n🖼️ มีรูปภาพแนบ' : ''}`);
            },
            edit: async (tx) => {
                const { error } = await supabase.from('transactions').update({
                    description: tx.description, amount: parseFloat(tx.amount), type: tx.type, category: tx.category,
                    date: tx.date, payment_method: tx.paymentMethod, image_url: tx.imageUrl
                }).eq('id', tx.id);
                if (error) throw error;
            },
            delete: async (id) => {
                const { error } = await supabase.from('transactions').delete().eq('id', id);
                if (error) throw error;
            }
        };

        // ==========================================
        // 4. ATOMIC UI COMPONENTS
        // ==========================================
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
            return (
                <div className="fixed top-6 right-6 z-[100] flex items-center gap-3 px-5 py-4 rounded-xl shadow-lg border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 animate-slide-in min-w-[300px]">
                    <div className={`p-2 rounded-full ${type==='success'?'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600':'bg-rose-100 dark:bg-rose-900/30 text-rose-600'}`}>
                        {type==='success'?<Icons.Check className="w-5 h-5"/>:<Icons.Alert className="w-5 h-5"/>}
                    </div>
                    <div><h4 className={`font-bold text-sm ${type==='success'?'text-emerald-700 dark:text-emerald-400':'text-rose-700 dark:text-rose-400'}`}>{type==='success'?'สำเร็จ':'แจ้งเตือน'}</h4><p className="text-xs text-slate-500 dark:text-slate-400">{message}</p></div>
                </div>
            );
        };

        const ThemeToggle = () => {
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            useEffect(() => {
                document.documentElement.classList.toggle('dark', theme === 'dark');
                localStorage.setItem('theme', theme);
            }, [theme]);
            return (
                <button onClick={() => setTheme(t => t==='light'?'dark':'light')} className="p-2 rounded-full text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    {theme==='light' ? <Icons.Moon className="w-5 h-5"/> : <Icons.Sun className="w-5 h-5"/>}
                </button>
            );
        };

        const ImageModal = ({ src, onClose }) => {
            if (!src) return null;
            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="relative max-w-3xl max-h-[90vh]"><img src={src} className="max-w-full max-h-[85vh] rounded-lg shadow-2xl" /><button onClick={onClose} className="absolute -top-12 right-0 text-white bg-white/10 p-2 rounded-full hover:bg-white/20"><Icons.X className="w-5 h-5"/></button></div>
                </div>
            );
        };

        // ==========================================
        // 5. FEATURE COMPONENTS
        // ==========================================
        const CategoryManagerModal = ({ isOpen, onClose, categories, onAdd, onDelete }) => {
            const [name, setName] = useState('');
            const [color, setColor] = useState(COLOR_PALETTE[0]);
            const [adding, setAdding] = useState(false);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                    <div className="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md p-6 shadow-2xl border dark:border-slate-800">
                        <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl dark:text-white">จัดการหมวดหมู่</h3><button onClick={onClose}><Icons.X className="w-5 h-5 text-slate-400"/></button></div>
                        <form onSubmit={async (e)=>{e.preventDefault(); if(!name)return; setAdding(true); await onAdd(name, color); setName(''); setAdding(false);}} className="mb-6 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border dark:border-slate-700">
                            <div className="flex gap-2 mb-3">
                                <input className="flex-1 bg-white dark:bg-slate-800 border dark:border-slate-600 rounded-lg px-3 py-2 text-sm outline-none dark:text-white" placeholder="ชื่อหมวดหมู่..." value={name} onChange={e=>setName(e.target.value)} required />
                                <div className="w-10 h-10 rounded-lg shadow-sm flex-shrink-0" style={{backgroundColor:color}}></div>
                            </div>
                            <div className="flex flex-wrap gap-2 mb-4">{COLOR_PALETTE.map(c=><button key={c} type="button" onClick={()=>setColor(c)} className={`w-6 h-6 rounded-full border-2 ${color===c?'border-brand-main scale-110':'border-transparent'}`} style={{backgroundColor:c}}></button>)}</div>
                            <button disabled={adding} className="w-full bg-brand-main text-white py-2 rounded-lg text-sm font-bold shadow-lg disabled:opacity-50">{adding?'กำลังเพิ่ม...':'เพิ่มหมวดหมู่'}</button>
                        </form>
                        <div className="space-y-2 max-h-60 overflow-y-auto">{categories.map(c=>(<div key={c.id} className="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg border dark:border-slate-700 group"><div className="flex items-center gap-3"><div className="w-3 h-3 rounded-full" style={{backgroundColor:c.color}}></div><span className="text-sm font-medium dark:text-slate-200">{c.name}</span></div>{c.isCustom && <button onClick={()=>onDelete(c.id)} className="text-slate-400 hover:text-brand-danger opacity-0 group-hover:opacity-100"><Icons.Trash className="w-4 h-4"/></button>}</div>))}</div>
                    </div>
                </div>
            );
        };

        const TransactionModal = ({ isOpen, type, data, onClose, onSave, categories }) => {
            const [f, setF] = useState({ description: '', amount: '', type: 'expense', category: 'food', date: Utils.getTodayDateString(), paymentMethod: 'cash', imageUrl: null });
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => { if(type==='edit' && data) setF(data); }, [type, data]);

            const submit = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    let url = f.imageUrl;
                    if(file) url = await ApiService.uploadSlip(file);
                    await onSave({ ...f, imageUrl: url });
                } catch(e) { console.error(e); } finally { setLoading(false); }
            };

            if(!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                    <div className="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md p-6 shadow-2xl overflow-y-auto max-h-[90vh] border dark:border-slate-800">
                        <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl dark:text-white">{type==='add'?'เพิ่มรายการใหม่':'แก้ไขรายการ'}</h3><button onClick={onClose}><Icons.X className="w-5 h-5 text-slate-400"/></button></div>
                        <form onSubmit={submit} className="space-y-4">
                            <div className="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex">{['expense', 'income'].map(t => <button key={t} type="button" onClick={()=>setF({...f, type:t})} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${f.type===t?(t==='income'?'bg-white dark:bg-slate-700 text-brand-success shadow-sm':'bg-white dark:bg-slate-700 text-brand-danger shadow-sm'):'text-slate-500 dark:text-slate-400'}`}>{t==='income'?'รายรับ':'รายจ่าย'}</button>)}</div>
                            <input required className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm dark:text-white outline-none" value={f.description} onChange={e=>setF({...f, description:e.target.value})} placeholder="รายละเอียด..." />
                            <div className="grid grid-cols-2 gap-4">
                                <input required type="number" className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm dark:text-white outline-none" value={f.amount} onChange={e=>setF({...f, amount:e.target.value})} placeholder="0.00" />
                                <input required type="date" className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm dark:text-white outline-none dark:[color-scheme:dark]" value={f.date} onChange={e=>setF({...f, date:e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm dark:text-white outline-none" value={f.category} onChange={e=>setF({...f, category:e.target.value})}>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                <div className="flex gap-2">{['cash', 'transfer'].map(m => <button key={m} type="button" onClick={()=>setF({...f, paymentMethod:m})} className={`flex-1 py-2.5 rounded-xl border text-sm flex justify-center items-center gap-1 ${f.paymentMethod===m?'border-brand-main bg-blue-50 dark:bg-blue-900/30 text-brand-main':'border-slate-200 dark:border-slate-700 text-slate-400'}`}>{m==='cash'?<Icons.Banknote className="w-4 h-4"/>:<Icons.CreditCard className="w-4 h-4"/>}</button>)}</div>
                            </div>
                            <div className="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl p-4 text-center relative hover:border-brand-main/50 transition-colors">
                                <input type="file" accept="image/*" onChange={e=>setFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {file ? <div className="text-sm text-brand-main flex items-center justify-center gap-2"><Icons.Image className="w-4 h-4"/> {file.name}</div> : f.imageUrl ? <div className="flex flex-col items-center"><img src={f.imageUrl} className="h-20 object-cover rounded mb-2 border" /><div className="text-xs text-brand-success">คลิกเพื่อเปลี่ยนรูป</div></div> : <div className="text-xs text-slate-400 flex flex-col items-center gap-1"><Icons.Image className="w-5 h-5 opacity-50"/><span>อัปโหลดสลิป</span></div>}
                            </div>
                            <button disabled={loading} className="w-full bg-brand-main text-white py-3.5 rounded-xl font-bold shadow-lg disabled:opacity-70 flex justify-center gap-2">{loading&&<div className="spinner"></div>} {loading?'กำลังบันทึก...':'บันทึกรายการ'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const TransactionTable = ({ transactions, user, categories, onEdit, onDelete, onViewImage, filterMonth, setFilterMonth, currentPage, totalPages, onPageChange, isLoading, limit, onViewAll, searchTerm, setSearchTerm }) => {
            return (
                <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-soft border border-slate-100 dark:border-slate-800 overflow-hidden flex flex-col h-full fade-in">
                    <div className="p-5 border-b border-slate-50 dark:border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            <h3 className="font-bold text-lg dark:text-white">{limit ? `รายการล่าสุด (${limit})` : 'รายการทั้งหมด'}</h3>
                            {limit && <button onClick={onViewAll} className="text-xs text-brand-main font-medium hover:underline flex items-center gap-1 sm:hidden">ดูทั้งหมด <Icons.ArrowLeft className="w-3 h-3 rotate-180"/></button>}
                        </div>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            <div className="relative flex-1 sm:w-64">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icons.Search className="w-4 h-4 text-slate-400"/></div>
                                <input type="text" placeholder="ค้นหา..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="pl-9 pr-3 py-1.5 w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-lg text-sm dark:text-white outline-none focus:ring-1 focus:ring-brand-main" />
                            </div>
                            {!limit && <div className="flex items-center gap-2 bg-slate-50 dark:bg-slate-800 px-3 py-1.5 rounded-lg border dark:border-slate-700"><input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="bg-transparent text-sm dark:text-white outline-none dark:[color-scheme:dark]" /><span className="text-xs text-brand-main pl-2 border-l dark:border-slate-600">{Utils.formatMonthYearTH(filterMonth)}</span></div>}
                            {limit && <button onClick={onViewAll} className="text-xs text-brand-main font-medium hover:underline hidden sm:flex items-center gap-1">ดูทั้งหมด <Icons.ArrowLeft className="w-3 h-3 rotate-180"/></button>}
                        </div>
                    </div>
                    <div className="overflow-x-auto flex-1 relative">
                        {isLoading && <div className="absolute inset-0 bg-white/60 dark:bg-slate-900/60 backdrop-blur-sm z-10 flex items-center justify-center"><div className="spinner border-brand-main border-t-transparent"></div></div>}
                        <table className="w-full text-sm text-left">
                            <thead className="text-xs text-slate-400 uppercase bg-slate-50 dark:bg-slate-800"><tr><th className="px-6 py-3">วันที่</th><th className="px-6 py-3">รายการ</th><th className="px-6 py-3">หมวดหมู่</th><th className="px-6 py-3">ช่องทาง</th><th className="px-6 py-3 text-right">จำนวน</th><th className="px-6 py-3 text-center">Actions</th></tr></thead>
                            <tbody>
                                {transactions.length===0 ? <tr><td colSpan="6" className="text-center py-10 text-slate-300">ไม่พบรายการ</td></tr> : transactions.map(t=>(
                                    <tr key={t.id} className="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                        <td className="px-6 py-3.5 whitespace-nowrap text-slate-500 font-mono text-xs">{Utils.formatDate(t.date)}</td>
                                        <td className="px-6 py-3.5 font-medium dark:text-slate-200"><div className="flex items-center gap-2">{t.description}{t.imageUrl && <button onClick={()=>onViewImage(t.imageUrl)} className="text-brand-accent bg-brand-accent/10 p-1 rounded"><Icons.Image className="w-4 h-4"/></button>}</div></td>
                                        <td className="px-6 py-3.5"><span className="px-2.5 py-0.5 rounded-full text-[10px] font-semibold" style={{backgroundColor:`${categories.find(c=>c.id===t.category)?.color||'#94a3b8'}15`,color:categories.find(c=>c.id===t.category)?.color||'#94a3b8'}}>{categories.find(c=>c.id===t.category)?.name||'Unknown'}</span></td>
                                        <td className="px-6 py-3.5 text-xs text-slate-400"><div className="flex items-center gap-1.5">{t.paymentMethod==='cash'?<Icons.Banknote className="w-4 h-4"/>:<Icons.CreditCard className="w-4 h-4"/>} {t.paymentMethod==='cash'?'เงินสด':'โอน'}</div></td>
                                        <td className={`px-6 py-3.5 text-right font-semibold font-mono ${t.type==='income'?'text-brand-success':'dark:text-slate-300'}`}>{t.type==='income'?'+':'-'} {Utils.formatCurrency(t.amount)}</td>
                                        <td className="px-6 py-3.5 text-center flex justify-center gap-3">
                                            {(user.role==='admin' || user.id===t.userId) && <button onClick={()=>onEdit(t)} className="text-slate-400 hover:text-brand-main"><Icons.Edit className="w-4 h-4"/></button>}
                                            {user.role==='admin' ? <button onClick={()=>onDelete(t.id)} className="text-slate-400 hover:text-brand-danger"><Icons.Trash className="w-4 h-4"/></button> : !(user.role==='admin'||user.id===t.userId) && <span className="text-slate-200"><Icons.Lock className="w-3 h-3"/></span>}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {!limit && <div className="p-4 border-t border-slate-50 dark:border-slate-800 flex justify-between items-center text-xs text-slate-500"><span>หน้า {currentPage} / {totalPages}</span><div className="flex gap-2"><button onClick={()=>onPageChange(Math.max(1,currentPage-1))} disabled={currentPage===1||isLoading} className="px-3 py-1 rounded border dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50">ก่อนหน้า</button><button onClick={()=>onPageChange(Math.min(totalPages,currentPage+1))} disabled={currentPage===totalPages||isLoading} className="px-3 py-1 rounded border dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50">ถัดไป</button></div></div>}
                </div>
            );
        };

        const Charts = ({ statsData, categories }) => {
            const chartData = useMemo(() => {
                const days = []; const today = new Date();
                for(let i=6; i>=0; i--) {
                    const d = new Date(today); d.setDate(today.getDate()-i);
                    const ds = d.toISOString().split('T')[0];
                    const txs = statsData.filter(t=>t.date===ds);
                    days.push({ 
                        label: d.toLocaleDateString('th-TH',{weekday:'short'}), 
                        inc: txs.filter(t=>t.type==='income').reduce((a,c)=>a+c.amount,0), 
                        exp: txs.filter(t=>t.type==='expense').reduce((a,c)=>a+c.amount,0) 
                    });
                }
                return days;
            }, [statsData]);
            
            const catStats = useMemo(() => {
                const exps = statsData.filter(t=>t.type==='expense');
                const total = exps.reduce((a,c)=>a+c.amount,0)||1;
                const byCat = exps.reduce((a,c)=>{ a[c.category]=(a[c.category]||0)+c.amount; return a; }, {});
                return Object.entries(byCat).map(([id,amt])=>({ ...categories.find(c=>c.id===id)||{name:'อื่นๆ',color:'#94a3b8'}, amt, pct:(amt/total)*100 })).sort((a,b)=>b.amt-a.amt).slice(0,5);
            }, [statsData, categories]);
            
            const max = Math.max(...chartData.map(d=>Math.max(d.inc, d.exp)), 100)*1.1;

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 h-64">
                    <div className="md:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-soft border dark:border-slate-800 flex flex-col">
                        <h3 className="text-sm font-semibold dark:text-white mb-4 flex items-center gap-2"><div className="p-1 bg-blue-50 dark:bg-blue-900/30 text-brand-main rounded"><Icons.TrendingUp className="w-4 h-4"/></div> แนวโน้ม 7 วัน</h3>
                        <div className="flex justify-between items-end flex-1 gap-2 pt-4 relative">
                            <div className="absolute inset-0 pointer-events-none flex flex-col justify-between opacity-20">{[...Array(4)].map((_,i)=><div key={i} className="border-b border-dashed border-slate-400 w-full h-px"></div>)}</div>
                            {chartData.map((d,i)=>(
                                <div key={i} className="flex flex-col items-center gap-2 w-full h-full justify-end group relative cursor-pointer">
                                    <div className="flex gap-1 items-end h-full"><div style={{height:`${Math.max((d.inc/max)*100,2)}%`}} className="w-3 bg-emerald-500 rounded-t transition-all group-hover:bg-emerald-400"></div><div style={{height:`${Math.max((d.exp/max)*100,2)}%`}} className="w-3 bg-rose-500 rounded-t transition-all group-hover:bg-rose-400"></div></div>
                                    <span className="text-[10px] text-slate-400">{d.label}</span>
                                    <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-[10px] p-2 rounded opacity-0 group-hover:opacity-100 transition-opacity z-20 whitespace-nowrap"><div className="text-emerald-300">รับ: {Utils.formatCurrency(d.inc)}</div><div className="text-rose-300">จ่าย: {Utils.formatCurrency(d.exp)}</div></div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-soft border dark:border-slate-800">
                        <h3 className="text-sm font-semibold dark:text-white mb-4">สัดส่วนรายจ่าย</h3>
                        <div className="space-y-4 overflow-y-auto max-h-48 pr-1">{catStats.length===0?<div className="text-center text-slate-400 text-xs mt-10">ไม่มีข้อมูล</div>:catStats.map(c=><div key={c.id}><div className="flex justify-between text-xs mb-1"><span className="dark:text-slate-300">{c.name}</span><span className="text-slate-400">{Utils.formatCurrency(c.amt)} ({c.pct.toFixed(0)}%)</span></div><div className="h-1.5 w-full bg-slate-100 dark:bg-slate-800 rounded-full"><div style={{width:`${c.pct}%`,backgroundColor:c.color}} className="h-full rounded-full"></div></div></div>)}</div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. MAIN APP LOGIC
        // ==========================================
        const Dashboard = ({ user, onLogout }) => {
            const [data, setData] = useState({ table: [], stats: [], balance: 0, summary: { curr:{inc:0,exp:0}, prev:{inc:0,exp:0} }, categories: DEFAULT_CATEGORIES });
            const [view, setView] = useState('dashboard');
            const [filter, setFilter] = useState({ month: new Date().toISOString().slice(0, 7), user: '', search: '', page: 1, total: 0 });
            const [ui, setUI] = useState({ modal: false, modalData: null, catManager: false, image: null, loading: false, toast: null });
            
            const showToast = (msg, type='success') => setUI(p => ({ ...p, toast: { message: msg, type } }));
            const closeModal = () => setUI(p => ({ ...p, toast: null }));

            const loadAll = async () => {
                setUI(p => ({ ...p, loading: true }));
                const target = filter.user || null;
                const [stats, bal, cats, summ] = await Promise.all([
                    ApiService.fetchStats(user, target),
                    ApiService.fetchTotalBalance(user, target),
                    ApiService.fetchCategories(user),
                    ApiService.fetchMonthlySummary(user, filter.month, target)
                ]);
                
                let limit = view === 'dashboard' ? APP_CONFIG.PAGINATION.DASHBOARD : APP_CONFIG.PAGINATION.LIST;
                let page = view === 'dashboard' ? 1 : filter.page;
                
                const { data: tbl, count } = await ApiService.fetchPaginated(user, page, filter.month, limit, target, filter.search);
                
                setData({ table: tbl, stats, balance: bal.totalBalance, summary: summ, categories: cats });
                setFilter(p => ({ ...p, total: count || 0 }));
                setUI(p => ({ ...p, loading: false }));
            };

            // Effects
            useEffect(() => { loadAll(); }, [user, filter.user, filter.month, filter.page, view]); 
            
            // Search Debounce
            useEffect(() => {
                const t = setTimeout(() => {
                    const target = filter.user || null;
                    let limit = view === 'dashboard' ? APP_CONFIG.PAGINATION.DASHBOARD : APP_CONFIG.PAGINATION.LIST;
                    ApiService.fetchPaginated(user, 1, filter.month, limit, target, filter.search).then(({data: tbl, count}) => {
                        setData(p => ({ ...p, table: tbl }));
                        setFilter(p => ({ ...p, total: count || 0, page: 1 }));
                    });
                }, 500);
                return () => clearTimeout(t);
            }, [filter.search]);

            const handleExport = async () => {
                setUI(p => ({ ...p, loading: true }));
                try {
                    const raw = await ApiService.fetchForExport(user, filter.month, filter.user||null);
                    const rows = raw.map(i => [Utils.formatDate(i.date), `"${i.description}"`, data.categories.find(c=>c.id===i.category)?.name||i.category, i.type, i.amount, i.payment_method, i.user_id, i.image_url||'' ]);
                    const csv = "\uFEFF" + [["Date","Desc","Category","Type","Amount","Method","User","Image"], ...rows].map(e=>e.join(",")).join("\n");
                    const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})); link.download = `export_${filter.month}.csv`; link.click();
                    showToast('Export สำเร็จ');
                } catch(e) { showToast('Export ล้มเหลว', 'error'); } finally { setUI(p => ({ ...p, loading: false })); }
            };

            const renderGrowth = (curr, prev, type) => {
                if (prev === 0) return <span className="text-xs text-slate-400">ไม่มีข้อมูลเดิม</span>;
                const pct = ((curr - prev) / prev) * 100;
                const good = type === 'income' ? pct > 0 : pct < 0;
                return <span className={`text-xs flex items-center gap-1 ${good ? 'text-emerald-500' : 'text-rose-500'}`}>{good ? <Icons.TrendingUp className="w-3 h-3"/> : <Icons.TrendingDown className="w-3 h-3"/>} {Math.abs(pct).toFixed(1)}%</span>;
            };

            return (
                <div className="flex flex-col h-screen max-h-screen bg-brand-bg dark:bg-slate-950 transition-colors">
                    {/* Header */}
                    <header className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 h-16 flex items-center justify-between px-4 sm:px-6 z-30">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                            <div className="bg-brand-main text-white p-1.5 rounded-lg shadow-glow"><Icons.Wallet className="w-6 h-6"/></div>
                            <h1 className="font-bold text-lg dark:text-white hidden sm:block">บัญชีโรงพยาบาลสัตว์<span className="text-brand-main">สุราษฎร์ธานี</span></h1>
                        </div>
                        <div className="flex items-center gap-3">
                            {user.role === 'admin' && <div className="hidden md:block"><div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 rounded-lg px-3 py-1.5"><Icons.User className="w-4 h-4 text-slate-400"/><select value={filter.user} onChange={e=>setFilter({...filter, user:e.target.value})} className="bg-transparent text-sm outline-none dark:text-white cursor-pointer"><option value="">ดูทั้งหมด</option>{USERS_DB.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div></div>}
                            <button onClick={()=>setUI(p=>({...p, catManager:true}))} className="p-2 text-slate-400 hover:text-brand-main"><Icons.Settings className="w-5 h-5"/></button>
                            {user.role==='admin' && <button onClick={handleExport} className="p-2 text-slate-400 hover:text-brand-main"><Icons.Download className="w-5 h-5"/></button>}
                            <div className="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
                            <ThemeToggle />
                            <button onClick={loadAll} className={`p-2 text-slate-400 hover:text-brand-main ${ui.loading?'animate-spin':''}`}><Icons.Refresh className="w-5 h-5"/></button>
                            <button onClick={onLogout} className="text-slate-400 hover:text-brand-danger ml-2"><Icons.LogOut className="w-5 h-5"/></button>
                        </div>
                    </header>

                    {/* Body */}
                    <main className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                        {view === 'dashboard' && (
                            <>
                                {/* Stats Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl p-6 text-white shadow-lg flex flex-col justify-between">
                                        <div><div className="text-blue-100 text-xs font-medium mb-1">ยอดคงเหลือสะสม</div><div className="text-3xl font-bold">{Utils.formatCurrency(data.balance)}</div></div>
                                        <div className="mt-4 text-[10px] bg-white/10 w-fit px-2 py-0.5 rounded text-blue-50">All time</div>
                                    </div>
                                    <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-soft border dark:border-slate-800 flex flex-col justify-center">
                                        <div className="flex items-center gap-2 mb-2 text-sm text-slate-500"><div className="p-1.5 bg-emerald-100 text-emerald-600 rounded"><Icons.TrendingUp className="w-4 h-4"/></div> รายรับ (เดือนนี้)</div>
                                        <div className="text-2xl font-bold dark:text-white mb-1">{Utils.formatCurrency(data.summary.curr.inc)}</div>
                                        {renderGrowth(data.summary.curr.inc, data.summary.prev.inc, 'income')}
                                    </div>
                                    <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-soft border dark:border-slate-800 flex flex-col justify-center">
                                        <div className="flex items-center gap-2 mb-2 text-sm text-slate-500"><div className="p-1.5 bg-rose-100 text-rose-600 rounded"><Icons.TrendingDown className="w-4 h-4"/></div> รายจ่าย (เดือนนี้)</div>
                                        <div className="text-2xl font-bold dark:text-white mb-1">{Utils.formatCurrency(data.summary.curr.exp)}</div>
                                        {renderGrowth(data.summary.curr.exp, data.summary.prev.exp, 'expense')}
                                    </div>
                                </div>
                                <Charts statsData={data.stats} categories={data.categories} />
                            </>
                        )}
                        
                        {view === 'list' && <button onClick={()=>setView('dashboard')} className="flex items-center gap-2 text-sm text-slate-500 hover:text-brand-main mb-4"><Icons.ArrowLeft className="w-4 h-4"/> กลับหน้าหลัก</button>}

                        <TransactionTable 
                            transactions={data.table} user={user} categories={data.categories}
                            filterMonth={filter.month} setFilterMonth={m => setFilter(p=>({...p, month:m, page:1}))}
                            currentPage={filter.page} totalPages={Math.ceil(filter.total / (view==='dashboard'?APP_CONFIG.PAGINATION.DASHBOARD:APP_CONFIG.PAGINATION.LIST))}
                            onPageChange={p => setFilter(pr=>({...pr, page:p}))}
                            isLoading={ui.loading} limit={view==='dashboard' ? APP_CONFIG.PAGINATION.DASHBOARD : null} onViewAll={()=>setView('list')}
                            searchTerm={filter.search} setSearchTerm={s => setFilter(p=>({...p, search:s}))}
                            onEdit={t => setUI(p=>({...p, modal:true, modalData:t}))}
                            onDelete={async (id) => { if(confirm("ลบรายการ?")) { try { await ApiService.delete(id); showToast('ลบสำเร็จ'); loadAll(); } catch(e){ showToast('ลบไม่สำเร็จ','error'); }}}}
                            onViewImage={img => setUI(p=>({...p, image:img}))}
                        />
                        
                        {/* Footer in Dashboard */}
                        <div className="mt-8 pt-4 border-t border-slate-100 dark:border-slate-800 text-center">
                            <p className="text-xs text-slate-400 dark:text-slate-500">ยิ่งยศ วิเชียรรัตน์</p>
                        </div>
                        <div className="h-12"></div>
                    </main>

                    {/* Floating Add Button */}
                    <button onClick={()=>setUI(p=>({...p, modal:true, modalData:null}))} className="fixed bottom-8 right-8 w-14 h-14 bg-brand-main text-white rounded-full shadow-lg shadow-blue-600/30 flex items-center justify-center hover:scale-110 hover:bg-blue-700 transition-all z-40"><Icons.Plus className="w-6 h-6"/></button>

                    {/* Modals */}
                    <TransactionModal isOpen={ui.modal} type={ui.modalData?'edit':'add'} data={ui.modalData} categories={data.categories} onClose={()=>setUI(p=>({...p, modal:false}))} 
                        onSave={async (d) => { 
                            try { 
                                if(ui.modalData) await ApiService.edit(d); 
                                else await ApiService.add(d, user, data.categories.find(c=>c.id===d.category)?.name||'ทั่วไป'); 
                                showToast(ui.modalData?'แก้ไขสำเร็จ':'บันทึกสำเร็จ'); loadAll(); setUI(p=>({...p, modal:false})); 
                            } catch(e) { showToast('เกิดข้อผิดพลาด','error'); } 
                        }} 
                    />
                    <CategoryManagerModal isOpen={ui.catManager} categories={data.categories} onClose={()=>setUI(p=>({...p, catManager:false}))} 
                        onAdd={async (n,c) => { try { await ApiService.addCategory(user,n,c); loadAll(); showToast('เพิ่มหมวดหมู่สำเร็จ'); } catch(e){ showToast('เพิ่มไม่สำเร็จ','error'); }}} 
                        onDelete={async (id) => { if(confirm("ลบหมวดหมู่?")) { try { await ApiService.deleteCategory(id); loadAll(); showToast('ลบสำเร็จ'); } catch(e){ showToast('ลบไม่สำเร็จ','error'); }}}} 
                    />
                    <ImageModal src={ui.image} onClose={()=>setUI(p=>({...p, image:null}))} />
                    {ui.toast && <Toast message={ui.toast.message} type={ui.toast.type} onClose={closeModal} />}
                </div>
            );
        };

        const Login = ({ onLogin }) => {
            const [f, setF] = useState({u:'', p:''});
            const [err, setErr] = useState('');
            const sub = (e) => {
                e.preventDefault();
                const found = USERS_DB.find(u => u.username===f.u && u.password===f.p);
                if(found) onLogin(found); else setErr('ข้อมูลไม่ถูกต้อง');
            };
            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-brand-bg dark:bg-slate-950 transition-colors">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-sm p-8 rounded-3xl shadow-soft border border-slate-100 dark:border-slate-800 relative">
                        <div className="absolute top-6 right-6">
                            <ThemeToggle />
                        </div>
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-brand-main rounded-2xl text-white mb-4 shadow-glow"><Icons.Wallet className="w-8 h-8"/></div>
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white">บัญชีโรงพยาบาลสัตว์สุราษฎร์ธานี</h1>
                            <p className="text-slate-400 text-sm">เข้าสู่ระบบเพื่อจัดการการเงิน</p>
                        </div>
                        <form onSubmit={sub} className="space-y-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">ชื่อผู้ใช้งาน</label>
                                <input className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm dark:text-white focus:border-brand-main outline-none transition-colors" placeholder="Username" value={f.u} onChange={e=>setF({...f, u:e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">รหัสผ่าน</label>
                                <input type="password" className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm dark:text-white focus:border-brand-main outline-none transition-colors" placeholder="รหัสผ่านตัวเลข 4 หลัก" value={f.p} onChange={e=>setF({...f, p:e.target.value})} />
                            </div>
                            {err && <div className="text-rose-500 text-xs text-center">{err}</div>}
                            <button className="w-full bg-brand-main text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">Sign In</button>
                        </form>
                        
                        {/* Footer in Login */}
                        <div className="mt-8 text-center">
                            <p className="text-xs text-slate-400 dark:text-slate-500">ยิ่งยศ วิเชียรรัตน์</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            return user ? <Dashboard user={user} onLogout={()=>setUser(null)} /> : <Login onLogin={setUser} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
