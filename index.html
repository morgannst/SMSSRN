        const Utils = {
            /** * Robust JSONP Fetch with Auto-Timeout 
             * Prevents infinite hanging if server is down.
             */
            fetchJSONP: (url, params, prefix = 'cb', timeoutMs = 15000) => {
                return new Promise((resolve, reject) => {
                    const cbName = `${prefix}_${Date.now()}_${Math.floor(Math.random()*1000)}`;
                    const script = document.createElement('script');
                    
                    const timeout = setTimeout(() => {
                        script.remove(); delete window[cbName];
                        reject(new Error('Request Timeout: Server took too long to respond.'));
                    }, timeoutMs);

                    window[cbName] = (res) => {
                        clearTimeout(timeout); script.remove(); delete window[cbName];
                        resolve(res);
                    };
                    script.onerror = () => {
                        clearTimeout(timeout); script.remove(); delete window[cbName];
                        reject(new Error('Network Error: Could not connect to the server.'));
                    };

                    const urlParams = new URLSearchParams({ ...params, callback: cbName });
                    script.src = `${url}?${urlParams.toString()}`;
                    document.body.appendChild(script);
                });
            },
            toBuddhistEra: (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear() + 543}`;
            },
            toGregorian: (buddhistDateStr) => {
                if (!buddhistDateStr || !buddhistDateStr.includes('/')) return null;
                const [d, m, y] = buddhistDateStr.split('/');
                return new Date(parseInt(y) - 543, parseInt(m) - 1, parseInt(d));
            },
            getStatus: (dateObj) => {
                if (!dateObj) return 'past';
                const today = new Date(); today.setHours(0, 0, 0, 0); dateObj.setHours(0, 0, 0, 0);
                if (dateObj > today) return 'future';
                if (dateObj.getTime() === today.getTime()) return 'today';
                return 'past';
            },
            generateMessage: (pet, type, date) => {
                const appt = type.split(' คำแนะนำ')[0];
                
                // ตรวจสอบเพื่อเพิ่มคำแนะนำพิเศษ
                let advice = "";
                if (appt.includes("วัคซีน")) {
                    advice = "\nคำแนะนำ: งดอาบน้ำและสังเกตอาการหลังฉีดวัคซีน 7 วัน";
                } else if (appt.includes("ทำหมัน")) {
                    advice = "\nคำแนะนำ: งดน้ำและอาหารอย่างน้อย 6 ชั่วโมง ก่อนทำหมัน";
                }

                // เลือกอีโมจิให้เข้ากับประเภทสัตว์
                let petEmoji = "🐾";
                if (type.includes("แมว") || type.includes("ลิวคีเมีย") || type.includes("COMBO")) {
                    petEmoji = "🐱";
                } else if (type.includes("สุนัข") || type.includes("NEXGARD") || type.includes("BRAVECTO")) {
                    petEmoji = "🐶";
                }
                
                return `แจ้งเตือนนัดหมายน้อง ${pet} ${petEmoji} วันพรุ่งนี้ (${date})\nนัด : ${appt}${advice}${CONFIG.SMS_FOOTER}`;
            },
            copyText: (text, btn, rowNum) => {
                const area = document.createElement('textarea'); area.value = text;
                area.style.position = 'fixed'; area.style.left = '-9999px'; document.body.appendChild(area); area.select();
                try {
                    document.execCommand('copy'); Toast.fire({ icon: 'success', title: 'คัดลอกข้อความแล้ว' });
                    State.copiedRows.add(rowNum);
                    if(btn) { btn.classList.add('copied'); btn.innerHTML = '<i class="fa-solid fa-check"></i>'; }
                } catch(e) { Swal.fire('Error', 'คัดลอกไม่สำเร็จ', 'error'); }
                document.body.removeChild(area);
            },
            addDays: (days) => {
                const currentDate = datePicker.selectedDates[0] || new Date();
                const newDate = new Date(currentDate); newDate.setDate(currentDate.getDate() + days);
                datePicker.setDate(newDate, true); Validation.check();
            }
        };

        const Validation = {
            check: () => {
                let isValid = true;
                DOM.form.querySelectorAll('[required]').forEach(el => { if (!el.value.trim()) isValid = false; });
                const phoneVal = DOM.phoneInput.value;
                if (phoneVal) {
                    if (!/^0\d{9}$/.test(phoneVal)) {
                        isValid = false; DOM.phoneInput.classList.add('invalid'); DOM.phoneError.style.display = 'block';
                        DOM.phoneError.textContent = !phoneVal.startsWith('0') ? 'ต้องขึ้นต้นด้วย 0' : phoneVal.length < 10 ? 'ต้องครบ 10 หลัก' : 'รูปแบบไม่ถูกต้อง';
                    } else {
                        DOM.phoneInput.classList.remove('invalid'); DOM.phoneError.style.display = 'none';
                    }
                }
                DOM.submitBtn.disabled = !isValid;
                if(DOM.saveAndAddBtn) DOM.saveAndAddBtn.disabled = !isValid;
            }
        };

        const datePicker = flatpickr("#sendDate", {
            locale: "th", altInput: true, altFormat: "d F Y", dateFormat: "Y-m-d",
            defaultDate: new Date(), disableMobile: true, onChange: () => Validation.check()
        });

        /**
         * ==========================================
         * SERVICES (CDP, AI, API)
         * ==========================================
         */
        const CDPService = {
            searchByPhone: async (phone) => {
                DOM.customerInfoContainer.innerHTML = '<span class="text-sm text-gray-500 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังค้นหาข้อมูลลูกค้าในระบบ...</span>';
                DOM.customerInfoContainer.classList.remove('hidden');
                DOM.petTagsContainer.classList.add('hidden');

                try {
                    const res = await Utils.fetchJSONP(CONFIG.CDP_URL, { action: 'searchByPhone', phone: phone }, 'cdpSearch', 10000);
                    
                    if (res.status === 'success' && res.data.found) {
                        const data = res.data;
                        const tierBadge = data.customer.tier ? `<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded ml-2 border border-yellow-200">${data.customer.tier}</span>` : '';
                        DOM.customerInfoContainer.innerHTML = `
                            <div class="bg-blue-50 border border-blue-100 text-blue-800 px-4 py-2 rounded-lg text-sm flex items-center justify-between">
                                <div><i class="fa-solid fa-user-check mr-2 text-blue-600"></i>เจ้าของ: <b>${data.customer.fullName}</b> ${tierBadge}</div>
                            </div>`;
                        
                        if (data.pets && data.pets.length > 0) {
                            DOM.petTagsContainer.innerHTML = data.pets.map(p => {
                                const isCat = p.species && p.species.includes('แมว');
                                return `<button type="button" class="bg-orange-50 border border-orange-200 text-orange-600 hover:bg-orange-100 text-sm px-3 py-1.5 rounded-full transition shadow-sm font-semibold" onclick="App.fillPetName('${p.petName.replace(/'/g, "\\'")}')">
                                            <i class="fa-solid ${isCat ? 'fa-cat' : 'fa-dog'} mr-1"></i>${p.petName}
                                        </button>`;
                            }).join('');
                            DOM.petTagsContainer.classList.remove('hidden');
                        } else {
                            DOM.petTagsContainer.innerHTML = `<span class="text-xs text-gray-500 italic ml-1">ไม่พบข้อมูลสัตว์เลี้ยงของลูกค้ารายนี้ในระบบ</span>`;
                            DOM.petTagsContainer.classList.remove('hidden');
                        }
                    } else {
                        DOM.customerInfoContainer.innerHTML = `<span class="text-sm text-gray-500 italic ml-1"><i class="fa-solid fa-user-plus mr-1"></i> ลูกค้าใหม่ (ไม่พบประวัติในระบบ)</span>`;
                    }
                } catch (err) {
                    console.error("CDP Search Error:", err);
                    DOM.customerInfoContainer.innerHTML = `<span class="text-sm text-red-500"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ${err.message || 'ระบบ CDP ขัดข้อง'}</span>`;
                }
            }
        };

        const AIService = {
            processText: async (text) => {
                const button = DOM.aiFillBtn; const originalText = button.innerHTML; const inputField = DOM.aiInput;
                try {
                    button.disabled = true; button.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> คิดอยู่...';
                    inputField.classList.add('ai-active');

                    const options = CONFIG.APPOINTMENT_TYPES.map(o => o.value).join(", ");
                    const res = await Utils.fetchJSONP(CONFIG.SCRIPT_URL, { action: 'processAi', text: text, options: options }, 'ai', 20000);
                    
                    if (res.result !== 'success') throw new Error(res.error);
                    const result = res.data;

                    if (result.petName) App.fillPetName(result.petName, false);
                    if (result.phoneNumber) {
                        DOM.phoneInput.value = result.phoneNumber;
                        if(result.phoneNumber.length === 10) CDPService.searchByPhone(result.phoneNumber);
                    }
                    if (result.appointmentType) DOM.appointmentSelect.value = result.appointmentType;
                    if (result.date) datePicker.setDate(result.date);

                    Toast.fire({ icon: 'success', title: 'AI เติมข้อมูลให้แล้ว!' });
                    Validation.check();
                } catch (error) {
                    console.error("AI Error:", error); Toast.fire({ icon: 'error', title: 'ขออภัย AI ไม่เข้าใจประโยคนี้' });
                } finally {
                    button.disabled = false; button.innerHTML = originalText; inputField.classList.remove('ai-active');
                }
            }
        };

        const API = {
            fetchData: async () => {
                UI.showSkeleton();
                try {
                    const res = await fetch(`${CONFIG.GVIZ_URL}&t=${new Date().getTime()}&_=${Math.floor(Math.random()*99999)}`, { headers: { 'Cache-Control': 'no-cache' } });
                    if (!res.ok) throw new Error(res.statusText);
                    const text = await res.text();
                    const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));

                    DOM.lastUpdated.textContent = `อัปเดต: ${new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}`;

                    State.allRows = (!json.table || !json.table.rows) ? [] : json.table.rows.map((r, i) => ({
                        rowNumber: i + 2, formattedDate: r.c[0]?.f || 'N/A', phone: (r.c[1]?.v || 'N/A').replace(/'/g, ''),
                        petName: r.c[2]?.v || 'N/A', appointmentType: r.c[3]?.v || 'N/A', smsMessage: r.c[5]?.v || ''
                    })).reverse();
                    UI.renderDashboard();
                } catch (err) {
                    console.error(err); DOM.dashboard.innerHTML = `<div class="text-center py-8 text-red-500"><i class="fa-solid fa-circle-exclamation text-2xl mb-2"></i><p>โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรช</p></div>`;
                }
            },

            // Dual-Write Submit (Uses Promise.allSettled for reliability)
            submit: async (data, loadingText, onSuccess, onError) => {
                Swal.fire({ title: loadingText, allowOutsideClick: false, didOpen: Swal.showLoading });
                
                try {
                    const promises = [];
                    // 1. ส่งเข้า SMS (หลัก)
                    promises.push(Utils.fetchJSONP(CONFIG.SCRIPT_URL, data, 'smsSubmit', 20000));
                    
                    // 2. ส่งเข้า CDP (เฉพาะตอนสร้างใหม่)
                    if (data.action === 'create') {
                        promises.push(Utils.fetchJSONP(CONFIG.CDP_URL, { 
                            action: 'addTransaction', phone: data.phoneNumber, petName: data.petName, 
                            sendDate: data.sendDate, appointmentType: data.appointmentType 
                        }, 'cdpSubmit', 15000));
                    }

                    // รอให้ทั้งคู่ทำงานเสร็จ 
                    const results = await Promise.allSettled(promises);
                    
                    // เช็คผลลัพธ์ของ SMS (index 0) เป็นหลัก
                    const smsResult = results[0];
                    if (smsResult.status === 'fulfilled' && smsResult.value.result === 'success') {
                        Swal.close();
                        setTimeout(() => onSuccess(), 50);
                    } else {
                        throw new Error(smsResult.value?.error || smsResult.reason?.message || 'SMS Submit Failed');
                    }
                    
                    // Log CDP Error ถ้ามี แต่ไม่ขัดขวางการทำงานหลัก
                    if (results[1] && results[1].status === 'rejected') {
                        console.warn("Notice: CDP Transaction failed to save silently.", results[1].reason);
                    }

                } catch (error) {
                    console.error("Submit Error:", error);
                    Swal.fire('Error', error.message || 'Network Error', 'error');
                    if(onError) onError();
                }
            }
        };

        /**
         * ==========================================
         * UI RENDERING
         * ==========================================
         */
        const UI = {
            renderAppointmentOptions: () => {
                const select = DOM.appointmentSelect;
                select.innerHTML = '<option value="" disabled selected>กรุณาเลือกประเภทนัด...</option>';
                CONFIG.APPOINTMENT_TYPES.forEach(appt => {
                    const option = document.createElement('option'); option.value = appt.value; option.textContent = appt.label;
                    select.appendChild(option);
                });
            },
            showSkeleton: () => { DOM.dashboard.innerHTML = Array(2).fill(`<div class="border rounded-xl p-4 animate-pulse bg-white"><div class="flex justify-between mb-2"><div class="h-6 bg-gray-200 rounded w-1/3"></div><div class="h-6 bg-gray-200 rounded w-8"></div></div><div class="h-4 bg-gray-200 rounded w-2/3 mb-2"></div><div class="flex gap-4"><div class="h-4 bg-gray-200 rounded w-1/4"></div><div class="h-4 bg-gray-200 rounded w-1/4"></div></div></div>`).join(''); },
            getStatusBadge: (status) => {
                if(status === 'future') return `<span class="absolute top-3 right-3 bg-green-100 text-green-700 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-green-200">🟢 นัดพรุ่งนี้/อนาคต</span>`;
                if(status === 'today') return `<span class="absolute top-3 right-3 bg-yellow-100 text-yellow-700 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-yellow-200">🟡 นัดวันนี้</span>`;
                return `<span class="absolute top-3 right-3 bg-gray-100 text-gray-600 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-gray-200">⚪ ผ่านมาแล้ว</span>`;
            },
            generateCardHTML: (row) => {
                const status = Utils.getStatus(Utils.toGregorian(row.formattedDate));
                const msg = row.smsMessage || Utils.generateMessage(row.petName, row.appointmentType, row.formattedDate);
                const isCopied = State.copiedRows.has(row.rowNumber);
                return `<div class="card p-4 relative hover:-translate-y-1 transition duration-200" data-row="${row.rowNumber}" data-msg="${encodeURIComponent(msg)}" data-pet="${row.petName}" data-phone="${row.phone}" data-type="${row.appointmentType}" data-date="${row.formattedDate}">
                            ${UI.getStatusBadge(status)}
                            <div class="flex justify-between items-start mb-1 mt-3"><h3 class="font-bold text-lg text-gray-800 pr-10">${row.petName}</h3>
                            <div class="flex gap-1 absolute top-10 right-3 sm:static">
                                <button class="action-btn ${isCopied ? 'copy-btn copied' : 'copy-btn'}" title="คัดลอก SMS"><i class="${isCopied ? 'fa-solid fa-check' : 'fa-regular fa-copy'}"></i></button>
                                <div class="w-px bg-gray-200 mx-1 h-6 self-center"></div>
                                <button class="edit-btn action-btn text-gray-500 hover:text-blue-600"><i class="fa-solid fa-pencil"></i></button>
                                <button class="delete-btn action-btn text-gray-500 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                            </div></div>
                            <p class="text-sm text-gray-600 mb-1"><i class="fa-solid fa-syringe w-4 text-center mr-1"></i> ${row.appointmentType.split(' คำแนะนำ')[0]}</p>
                            <div class="flex text-sm text-gray-500 gap-4"><span><i class="fa-solid fa-mobile-screen-button w-4 text-center mr-1"></i>${row.phone}</span><span><i class="fa-solid fa-calendar-days w-4 text-center mr-1"></i>${row.formattedDate}</span></div>
                        </div>`;
            },
            renderDashboard: () => {
                let rows = State.allRows; const today = new Date(); today.setHours(0,0,0,0);
                if (State.currentFilter === 'today') rows = rows.filter(r => Utils.toGregorian(r.formattedDate)?.getTime() === today.getTime());
                else if (State.currentFilter === 'tomorrow') { const tmr = new Date(today); tmr.setDate(tmr.getDate() + 1); rows = rows.filter(r => Utils.toGregorian(r.formattedDate)?.getTime() === tmr.getTime()); }
                const term = DOM.searchInput.value.trim().toLowerCase();
                if (term) rows = rows.filter(r => r.petName.toLowerCase().includes(term) || r.phone.includes(term));
                
                DOM.resultCount.textContent = `${rows.length} รายการ`; DOM.resultCount.classList.remove('hidden');
                if (rows.length === 0) { DOM.dashboard.innerHTML = `<div class="text-center py-8 text-gray-400 opacity-70"><i class="fa-solid fa-folder-open text-4xl mb-2"></i><p>ไม่พบข้อมูล</p></div>`; return; }
                DOM.dashboard.innerHTML = `<div class="space-y-3">${(term || State.currentFilter !== 'all' ? rows : rows.slice(0, 3)).map(UI.generateCardHTML).join('')}</div>`;
            },
            updateFormState: () => {
                const { isEditing } = State;
                DOM.formHeader.icon.className = `fa-solid ${isEditing ? 'fa-pencil text-amber-500' : 'fa-file-pen text-blue-600'} mr-3`;
                DOM.formHeader.title.textContent = isEditing ? 'แก้ไขข้อมูล' : 'สร้างข้อความแจ้งเตือน';
                DOM.submitBtn.className = `${isEditing ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold py-3 px-4 rounded-lg shadow-lg flex items-center justify-center w-full transition`;
                DOM.submitBtnEl.text.textContent = isEditing ? 'อัปเดตข้อมูล' : 'บันทึก';
                DOM.submitBtnEl.icon.className = `fa-solid ${isEditing ? 'fa-floppy-disk' : 'fa-paper-plane'} mr-2`;
                DOM.clearBtnText.textContent = isEditing ? 'ยกเลิก' : 'ล้างฟอร์ม';
                DOM.saveAndAddBtn.classList.toggle('hidden', isEditing);
                DOM.buttonsContainer.className = `pt-4 grid gap-3 ${isEditing ? 'grid-cols-1 sm:grid-cols-2' : 'grid-cols-1 sm:grid-cols-3'}`;
                Validation.check();
            }
        };

        /**
         * ==========================================
         * APPLICATION CONTROLLER
         * ==========================================
         */
        const App = {
            init: () => { 
                UI.renderAppointmentOptions(); 
                App.bindEvents(); 
                Validation.check(); 
                API.fetchData(); 
            },
            
            bindEvents: () => {
                DOM.form.addEventListener('submit', (e) => App.handleSubmit(e, false));
                DOM.clearBtn.addEventListener('click', App.resetForm);
                DOM.saveAndAddBtn.addEventListener('click', (e) => App.handleSubmit(e, true));
                DOM.refreshBtn.addEventListener('click', API.fetchData);
                DOM.searchInput.addEventListener('input', UI.renderDashboard);
                DOM.dashboard.addEventListener('click', App.handleDashboardClick);
                
                DOM.add1DayBtn.addEventListener('click', () => Utils.addDays(1));
                DOM.add2DayBtn.addEventListener('click', () => Utils.addDays(2));

                DOM.aiFillBtn.addEventListener('click', App.handleAIPromptClick);
                DOM.promptChips.forEach(chip => chip.addEventListener('click', App.handleAIPromptChipClick));
                DOM.quickApptBtns.forEach(btn => btn.addEventListener('click', App.handleQuickApptClick));
                DOM.filters.forEach(btn => btn.addEventListener('click', (e) => App.handleFilter(e.target.dataset.filter)));
                
                DOM.phoneInput.addEventListener('input', App.handlePhoneInput);
                DOM.petInput.addEventListener('input', App.handlePetInput);
                DOM.appointmentSelect.addEventListener('change', Validation.check);
            },

            // --- Event Handlers Extracted for Cleanliness ---

            handleAIPromptClick: () => { 
                const text = DOM.aiInput.value.trim(); 
                if(text) AIService.processText(text); 
            },

            handleAIPromptChipClick: (e) => {
                const currentText = DOM.aiInput.value.trim(); 
                DOM.aiInput.value = currentText ? `${currentText} ${e.target.textContent}` : e.target.textContent; 
                DOM.aiInput.focus();
            },

            handleQuickApptClick: (e) => {
                const targetBtn = e.target.closest('.quick-appt-btn');
                if (targetBtn && targetBtn.dataset.val) { 
                    DOM.appointmentSelect.value = targetBtn.dataset.val; 
                    Validation.check(); 
                }
            },

            handlePhoneInput: (e) => {
                let val = e.target.value.replace(/[^0-9]/g, ''); 
                e.target.value = val;
                
                // ค้นหา CDP (เฉพาะกรอกครบ 10 หลัก)
                if (val.length === 10) {
                    CDPService.searchByPhone(val);
                } else { 
                    DOM.customerInfoContainer.classList.add('hidden'); 
                    DOM.petTagsContainer.classList.add('hidden'); 
                }
                
                // แนะนำคำ (Autocomplete) จากประวัติ SMS เดิม
                App.handleAutocomplete(e.target, 'phone');
            },

            handlePetInput: (e) => {
                App.handleAutocomplete(e.target, 'pet');
            },

            handleAutocomplete: (input, type) => {
                const val = input.value.trim().toLowerCase();
                const list = DOM.suggestions[type];
                
                Validation.check();
                if (val.length < 2) { list.style.display = 'none'; return; }

                const seen = new Set();
                const matches = State.allRows.filter(r => {
                    const target = type === 'phone' ? r.phone : r.petName.toLowerCase();
                    const key = r.phone + r.petName;
                    if (target.includes(val) && !seen.has(key)) {
                        seen.add(key); return true;
                    }
                    return false;
                });

                if (matches.length > 0) {
                    list.innerHTML = matches.slice(0, 5).map(r => `
                        <div class="suggestion-item" onclick="App.fillFormFromAutocomplete('${r.petName.replace(/'/g, "\\'")}', '${r.phone}')">
                            <span class="font-semibold text-gray-800">${type === 'phone' ? r.phone : r.petName}</span>
                            <span class="text-sm text-gray-500">${type === 'phone' ? r.petName : r.phone}</span>
                        </div>`).join('');
                    list.style.display = 'block';
                } else {
                    list.style.display = 'none';
                }
            },

            // --- Form Actions ---

            handleSubmit: (e, isAddAnother = false) => {
                if(e) e.preventDefault(); 
                Validation.check(); 
                if (DOM.submitBtn.disabled) return;

                const formData = { 
                    action: State.isEditing ? 'update' : 'create', 
                    petName: DOM.petInput.value.trim(), 
                    phoneNumber: DOM.phoneInput.value.trim(), 
                    appointmentType: DOM.appointmentSelect.value, 
                    sendDate: Utils.toBuddhistEra(DOM.sendDateInput.value), 
                    rowNumber: State.editingRowNumber 
                };

                if (!State.isEditing && State.allRows.some(r => r.petName === formData.petName && r.formattedDate === formData.sendDate)) {
                    Swal.fire({ title: 'พบข้อมูลซ้ำ!', text: `มีน้อง ${formData.petName} วันที่ ${formData.sendDate} แล้ว ยืนยันบันทึก?`, icon: 'warning', showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก' })
                        .then((res) => { if (res.isConfirmed) API.submit(formData, 'กำลังบันทึก...', () => App.onSaveSuccess(isAddAnother)); });
                    return;
                }
                API.submit(formData, State.isEditing ? 'กำลังอัปเดต...' : 'กำลังบันทึก...', () => App.onSaveSuccess(isAddAnother));
            },

            onSaveSuccess: (isAddAnother) => {
                Toast.fire({ icon: 'success', title: State.isEditing ? 'อัปเดตเรียบร้อย' : 'บันทึกเรียบร้อย' });
                if (isAddAnother && !State.isEditing) { 
                    DOM.petInput.value = ''; 
                    DOM.petInput.focus(); 
                    Validation.check(); 
                } else {
                    App.resetForm();
                }
                API.fetchData();
            },

            handleDashboardClick: (e) => {
                const card = e.target.closest('.card'); if (!card) return;
                const copyBtn = e.target.closest('.copy-btn'); 
                if (copyBtn) return Utils.copyText(decodeURIComponent(card.dataset.msg), copyBtn, parseInt(card.dataset.row));
                
                if (e.target.closest('.edit-btn')) {
                    State.isEditing = true; State.editingRowNumber = card.dataset.row;
                    DOM.petInput.value = card.dataset.pet; 
                    DOM.phoneInput.value = card.dataset.phone; 
                    DOM.appointmentSelect.value = card.dataset.type;
                    const gDate = Utils.toGregorian(card.dataset.date); 
                    if(gDate) datePicker.setDate(gDate);
                    UI.updateFormState(); window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (e.target.closest('.delete-btn')) {
                    const row = parseInt(card.dataset.row);
                    Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก' })
                        .then((res) => { 
                            if (res.isConfirmed) API.submit({ action: 'delete', rowNumber: row }, 'กำลังลบ...', () => {
                                State.allRows = State.allRows.filter(r => r.rowNumber != row); 
                                State.allRows.forEach(r => { if(r.rowNumber > row) r.rowNumber--; });
                                UI.renderDashboard(); 
                                Toast.fire({ icon: 'success', title: 'ลบข้อมูลแล้ว' });
                            }, () => API.fetchData()); 
                        });
                }
            },

            handleFilter: (type) => {
                State.currentFilter = type;
                DOM.filters.forEach(btn => {
                    const isActive = btn.dataset.filter === type; btn.classList.toggle('active', isActive);
                    btn.className = isActive ? "filter-btn active px-4 py-2 rounded-full bg-blue-50 text-blue-600 border border-blue-200 text-sm font-medium whitespace-nowrap transition-colors" : "filter-btn px-4 py-2 rounded-full bg-white text-gray-600 border border-gray-200 text-sm font-medium whitespace-nowrap transition-colors hover:bg-gray-50";
                }); 
                UI.renderDashboard();
            },

            // ใช้เติมข้อมูลเมื่อกดเลือกจาก Dropdown เบอร์เก่า
            fillFormFromAutocomplete: (pet, phone) => {
                DOM.petInput.value = pet;
                DOM.phoneInput.value = phone;
                Object.values(DOM.suggestions).forEach(el => el.style.display = 'none');
                Validation.check();
                if(phone && phone.length === 10) CDPService.searchByPhone(phone);
            },

            // ใช้เติมข้อมูลเมื่อกดเลือกแท็ก CDP 
            fillPetName: (pet, focus = true) => { 
                DOM.petInput.value = pet; 
                Object.values(DOM.suggestions).forEach(el => el.style.display = 'none');
                Validation.check(); 
                if(focus) DOM.petInput.focus(); 
            },

            resetForm: () => {
                State.isEditing = false; State.editingRowNumber = null; 
                DOM.form.reset(); datePicker.setDate(new Date());
                DOM.customerInfoContainer.classList.add('hidden'); 
                DOM.petTagsContainer.classList.add('hidden'); 
                Object.values(DOM.suggestions).forEach(el => el.style.display = 'none');
                UI.updateFormState();
            }
        };

        // Expose globally for HTML onclick handlers
        window.App = App; 
        
        // Let's go!
        App.init();

    </script>
</body>
</html>
